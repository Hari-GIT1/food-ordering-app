<div class="container">
    <h2>Your Cart</h2>
  
    <div *ngFor="let item of items; let i = index" class="card">
      <div>
        <h3>{{ item.name }}</h3>
        <p>₹{{ item.price }}</p>
      </div>
  
      <button (click)="remove(i)">Remove</button>
    </div>
  
    <h3>Total: ₹{{ total }}</h3>
  
    <button routerLink="/customer/checkout">Checkout</button>
  </div>
